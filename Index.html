<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Portfolio | Admin Panel</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* GIỮ NGUYÊN TOÀN BỘ PHẦN STYLE CỦA BẠN Ở ĐÂY */
        *{margin:0;padding:0;box-sizing:border-box}
        body{ font-family:'Inter', sans-serif; color:white; background:radial-gradient(circle at top,#1c2f6b 0%,#0b1435 40%,#050a18 100%); min-height:100vh; overflow-x:hidden; }
        body.view-only .admin-btn, body.view-only .delete-file, body.view-only .delete-project, body.view-only input[type="file"], body.view-only .hero-media button { display: none !important; }
        header{ display:flex; align-items:center; justify-content:space-between; padding:20px 8%; border-bottom:1px solid rgba(255,255,255,.08); background: rgba(5, 10, 24, 0.9); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100;}
        .header-left{display:flex;align-items:center;gap:15px;}
        .logo{font-weight:700;font-size:22px;color:#4cc9f0;cursor:pointer;letter-spacing: 1px;}
        .avatar{width:45px;height:45px;border-radius:50%;overflow:hidden;border:2px solid rgba(76, 201, 240, 0.5);cursor:pointer;position:relative;background:#222;}
        .avatar img{width:100%;height:100%;object-fit:cover;}
        .avatar input{display:none}
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 5%; }
        .page { display: none; opacity: 0; padding: 40px 0 80px 0; }
        .page.active { display: block; animation: fadeInPage 0.6s forwards; }
        @keyframes fadeInPage { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .hero{text-align:center; padding: 40px 0 60px 0;}
        .hero-media{max-width:850px; margin:30px auto; position:relative; border-radius: 15px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.6);}
        .hero-media img, .hero-media video{width:100%; display: block; aspect-ratio:16/9; object-fit:cover;}
        .hero-media button{position:absolute;top:15px;right:15px;background:#ff4d6d;border:none;width:32px;height:32px;border-radius:50%;color:white;cursor:pointer;z-index:10;}
        .category-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:30px; margin-bottom: 60px;}
        .category{background:rgba(17, 24, 51, 0.6); padding:60px 30px; border-radius:18px; text-align:center; cursor:pointer; transition:0.4s; border: 1px solid rgba(255,255,255,0.05);}
        .category:hover{transform:translateY(-12px); border-color: #4cc9f0;}
        .project-folder{ background:rgba(17, 24, 51, 0.8); padding:35px; border-radius:20px; margin-top:40px; border: 1px solid rgba(255,255,255,0.03);}
        .project-media{ display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:18px;}
        .media-item{position:relative; border-radius: 12px; overflow: hidden; background: #000;}
        .media-item img, .media-item video{width:100%; cursor:pointer; aspect-ratio:1/1; object-fit:cover;}
        .btn{background:#4cc9f0; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:700;}
        .login-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:10000; }
        .login-box { background:#111833; padding:40px; border-radius:20px; width:400px; text-align:center; }
        .viewer{ position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); display:none; align-items:center; justify-content:center; z-index:9999;}
    </style>
</head>

<body class="view-only">
    <header>
        <div class="header-left">
            <div class="logo" onclick="goHome()">PORTFOLIO</div>
            <label class="avatar">
                <input type="file" onchange="addAvatar(this)">
                <img id="avatarImg" src="">
            </label>
        </div>
        <button id="authBtn" class="btn" onclick="showLoginModal()">Đăng nhập Admin</button>
    </header>

    <div class="container">
        <div class="page active" id="home">
            <section class="hero">
                <h1>Creative Portfolio</h1>
                <div class="admin-btn">
                    <input type="file" id="heroUpload" multiple>
                    <button id="heroBtn" class="btn" onclick="addHero()">+ Add Media</button>
                </div>
                <div id="heroContainer"></div>
            </section>
            <section class="category-grid">
                <div class="category" onclick="openPage('posterPage')"><span>🖼</span> Poster</div>
                <div class="category" onclick="openPage('printPage')"><span>📦</span> Print</div>
                <div class="category" onclick="openPage('videoPage')"><span>🎬</span> Video</div>
            </section>
        </div>

        <div class="page" id="posterPage">
            <h2 onclick="goHome()">← Back</h2>
            <div class="admin-btn">
                <input id="posterClient" placeholder="Client">
                <input id="posterIndustry" placeholder="Industry">
                <button class="btn" onclick="createProject('poster')">Tạo Project</button>
            </div>
            <div id="posterProjects"></div>
        </div>
        <div class="page" id="printPage"><h2 onclick="goHome()">← Back</h2><div id="printProjects"></div></div>
        <div class="page" id="videoPage"><h2 onclick="goHome()">← Back</h2><div id="videoProjects"></div></div>
    </div>

    <div id="loginModal" class="login-modal">
        <div class="login-box">
            <input type="email" id="adminEmail" placeholder="Email">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn" onclick="performLogin()">Login</button>
            <p onclick="closeLoginModal()">Hủy</p>
        </div>
    </div>

    <div id="viewer" class="viewer" onclick="closeViewer()">
        <div id="viewerContent"></div>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

// !!! QUAN TRỌNG: THAY THÔNG TIN CỦA BẠN VÀO ĐÂY !!!
const firebaseConfig = {
      apiKey: "AIzaSyC_lK-uKgPrHFPYY5sb2hGH5faN_YkG2H4",
  authDomain: "porfolio-7d5f6.firebaseapp.com",
  databaseURL: "https://porfolio-7d5f6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "porfolio-7d5f6",
  storageBucket: "porfolio-7d5f6.firebasestorage.app",
  messagingSenderId: "574219986063",
  appId: "1:574219986063:web:a13875f3841b272130fcfa"
};

const CLOUDINARY_CLOUD_NAME = "dei1pbxpm"; 
const CLOUDINARY_UPLOAD_PRESET = "Porfolio"; 

// Khởi tạo
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let isAdmin = false;

// Theo dõi đăng nhập
onAuthStateChanged(auth, (user) => {
    const btn = document.getElementById("authBtn");
    if (user) {
        isAdmin = true; document.body.classList.remove("view-only");
        btn.innerText = "Đăng xuất"; btn.onclick = () => signOut(auth);
    } else {
        isAdmin = false; document.body.classList.add("view-only");
        btn.innerText = "Đăng nhập Admin"; btn.onclick = window.showLoginModal;
    }
});

// --- CÁC HÀM GÁN VÀO WINDOW ĐỂ CHẠY ĐƯỢC TỪ HTML ---
window.goHome = () => { document.querySelectorAll(".page").forEach(p=>p.classList.remove("active")); document.getElementById("home").classList.add("active"); };
window.openPage = (id) => { document.querySelectorAll(".page").forEach(p=>p.classList.remove("active")); document.getElementById(id).classList.add("active"); };
window.showLoginModal = () => document.getElementById("loginModal").style.display = "flex";
window.closeLoginModal = () => document.getElementById("loginModal").style.display = "none";

window.performLogin = async () => {
    try { await signInWithEmailAndPassword(auth, document.getElementById("adminEmail").value, document.getElementById("adminPass").value); window.closeLoginModal(); } 
    catch (e) { alert("Lỗi đăng nhập!"); }
};

window.createProject = async (type, exId=null, exC=null, exI=null) => {
    const id = exId || type + "_" + Date.now();
    const client = exC || document.getElementById(type + "Client").value;
    const industry = exI || document.getElementById(type + "Industry").value;
    if (!client && !exId) return;
    if (!exId) await setDoc(doc(db, "projects", id), { id, type, client, industry });

    const folder = document.createElement("div"); folder.className = "project-folder"; folder.id = id;
    folder.innerHTML = `<h3>${client} (${industry})</h3><div class="admin-btn"><input type="file" multiple onchange="addMedia(event, '${id}')"></div><div class="project-media"></div>`;
    document.getElementById(type + "Projects").prepend(folder);
};

window.addMedia = async (e, pId) => {
    for (let f of e.target.files) {
        const formData = new FormData();
        formData.append("file", f);
        formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`, { method: "POST", body: formData });
        const data = await res.json();
        if(data.secure_url) {
            const item = { id: "m_"+Date.now(), projectId: pId, data: data.secure_url, type: f.type.startsWith("video")?"video":"image" };
            await setDoc(doc(db, "media", item.id), item);
            renderMedia(item);
        }
    }
};

function renderMedia(item) {
    const div = document.createElement("div"); div.className = "media-item";
    const m = document.createElement(item.type === "video" ? "video" : "img");
    m.src = item.data; m.onclick = () => window.openViewer(item.data, item.type);
    div.append(m); document.getElementById(item.projectId).querySelector(".project-media").append(div);
}

window.openViewer = (src, type) => {
    const content = document.getElementById("viewerContent");
    content.innerHTML = type === "video" ? `<video src="${src}" controls autoplay></video>` : `<img src="${src}">`;
    document.getElementById("viewer").style.display = "flex";
};
window.closeViewer = () => document.getElementById("viewer").style.display = "none";

// Tải dữ liệu ban đầu
const load = async () => {
    const p = await getDocs(collection(db, "projects"));
    p.forEach(d => window.createProject(d.data().type, d.id, d.data().client, d.data().industry));
    const m = await getDocs(collection(db, "media"));
    m.forEach(d => renderMedia(d.data()));
};
load();
</script>
</body>
</html>
